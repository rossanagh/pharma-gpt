<div class="auth-page">
  <div class="auth-card" role="region" [attr.aria-label]="'ai.register' | translate">
    <button type="button" class="auth-close" routerLink="/dashboard" [attr.aria-label]="'ai.close' | translate">
      {{ 'ai.close' | translate }}
    </button>

    <div class="auth-top">
      <div class="auth-logo" aria-hidden="true">
        <div class="auth-logo-mark">ME</div>
        <span class="auth-logo-name">MedicinEvidence</span>
      </div>
      <div class="auth-title">{{ 'auth.registerTitle' | translate }}</div>
      <div class="auth-sub">{{ 'auth.registerSub' | translate }}</div>
    </div>

    <form class="auth-body" (ngSubmit)="onSubmit()">
      <div class="verify-note">
        <span class="vn-ic">🔐</span>
        <p>
          <strong>{{ 'auth.verifiedTitle' | translate }}</strong>
          {{ 'auth.verifiedBody' | translate }}
        </p>
      </div>

      <div class="role-wrap">
        <label class="fl">{{ 'auth.iAmA' | translate }}</label>
        <div class="role-sel">
          <button type="button" class="rb" [class.on]="providerType==='medic'" (click)="providerType='medic'">
            <span class="r-ic">👨‍⚕️</span><span class="r-nm">{{ 'auth.rolePhysician' | translate }}</span>
          </button>
          <button type="button" class="rb" [class.on]="providerType==='farmacist'" (click)="providerType='farmacist'">
            <span class="r-ic">💊</span><span class="r-nm">{{ 'auth.rolePharmacist' | translate }}</span>
          </button>
          <button type="button" class="rb" [class.on]="providerType==='asistent_medical'" (click)="providerType='asistent_medical'">
            <span class="r-ic">🩺</span><span class="r-nm">{{ 'auth.roleNurse' | translate }}</span>
          </button>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label for="firstName">{{ 'auth.firstName' | translate }}</label>
          <input id="firstName" type="text" [(ngModel)]="firstName" name="firstName" placeholder="Ex: Andrei" required minlength="2" />
        </div>
        <div class="form-group">
          <label for="lastName">{{ 'auth.lastName' | translate }}</label>
          <input id="lastName" type="text" [(ngModel)]="lastName" name="lastName" placeholder="Ex: Popescu" required minlength="2" />
        </div>

        <div class="form-group">
          <label for="email">{{ 'auth.institutionalEmail' | translate }}</label>
          <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="dr.ionescu@hospital.ro" required />
        </div>
        <div class="form-group">
          <label for="phoneNumber">{{ 'auth.phone' | translate }} <span class="optional">({{ 'auth.optional' | translate }})</span></label>
          <input id="phoneNumber" type="tel" [(ngModel)]="phoneNumber" name="phoneNumber" placeholder="07xx xxx xxx" />
        </div>

        <div class="form-group full">
          <label for="providerType">{{ 'auth.providerType' | translate }}</label>
          <select id="providerType" [(ngModel)]="providerType" name="providerType" required>
            <option value="medic">{{ 'auth.rolePhysician' | translate }}</option>
            <option value="farmacist">{{ 'auth.rolePharmacist' | translate }}</option>
            <option value="asistent_medical">{{ 'auth.roleNurse' | translate }}</option>
            <option value="asistent_farmacist">{{ 'auth.roleAssistantPharmacist' | translate }}</option>
          </select>
        </div>

        @if (showMedicFields) {
          <div class="form-group">
            <label for="medicGrade">Grad profesional</label>
            <select id="medicGrade" [(ngModel)]="medicGrade" name="medicGrade" required>
              @for (g of medicGrades; track g.value) {
                <option [value]="g.value">{{ g.label }}</option>
              }
            </select>
          </div>
          <div class="form-group">
            <label for="specialty">Specialitate medicală</label>
            <select id="specialty" [(ngModel)]="specialty" name="specialty" required>
              <option value="" disabled>— Selectați —</option>
              @for (s of specialties; track s) {
                <option [value]="s">{{ s }}</option>
              }
            </select>
          </div>
        }

        <div class="form-group">
          <label for="academicTitles">Titluri academice <span class="optional">(opț.)</span></label>
          <input
            id="academicTitles"
            type="text"
            [(ngModel)]="academicTitles"
            name="academicTitles"
            placeholder="Opțional"
            maxlength="500"
          />
        </div>
        <div class="form-group">
          <label for="parafa">Parafă</label>
          <input
            id="parafa"
            type="text"
            [(ngModel)]="parafa"
            name="parafa"
            placeholder="Cod / identificator parafă"
            required
            minlength="2"
            maxlength="255"
          />
        </div>

        <div class="form-group full">
          <label for="password">{{ 'auth.password' | translate }}</label>
          <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required minlength="6" />
        </div>
      </div>
      @if (error) {
        <div class="auth-err">{{ error }}</div>
      }
      <button type="submit" class="btn-sub" [disabled]="loading">
        {{ loading ? ('auth.creating' | translate) : ('auth.createAccount' | translate) }}
      </button>
    </form>
    <p class="asw">{{ 'auth.haveAccount' | translate }} <a routerLink="/login">{{ 'ai.signIn' | translate }}</a></p>
  </div>
</div>
