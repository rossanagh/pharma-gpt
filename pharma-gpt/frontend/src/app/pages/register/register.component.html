<div class="register-page">
  <div class="register-card">
    <div class="brand-lock" aria-hidden="true">
      <img class="brand-mark" src="branding/logo.png" width="48" height="48" alt="" />
      <div class="brand-text">
        <span class="brand-name">Pharma-GPT</span>
        <span class="brand-tagline">Platformă medicală inteligentă</span>
      </div>
    </div>
    <h2>Înregistrare</h2>
    <form (ngSubmit)="onSubmit()">
      <div class="form-grid">
        <div class="form-group">
          <label for="firstName">Prenume</label>
          <input id="firstName" type="text" [(ngModel)]="firstName" name="firstName" placeholder="Ex: Andrei" required minlength="2" />
        </div>
        <div class="form-group">
          <label for="lastName">Nume</label>
          <input id="lastName" type="text" [(ngModel)]="lastName" name="lastName" placeholder="Ex: Popescu" required minlength="2" />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="email@domeniu.ro" required />
        </div>
        <div class="form-group">
          <label for="phoneNumber">Telefon</label>
          <input id="phoneNumber" type="tel" [(ngModel)]="phoneNumber" name="phoneNumber" placeholder="07xx xxx xxx" />
        </div>

        <div class="form-group full">
          <label for="providerType">Categorie profesională</label>
          <select id="providerType" [(ngModel)]="providerType" name="providerType" required>
            <option value="medic">Medic</option>
            <option value="farmacist">Farmacist</option>
            <option value="asistent_medical">Asistent medical</option>
            <option value="asistent_farmacist">Asistent farmacist</option>
          </select>
        </div>

        @if (showMedicFields) {
          <div class="form-group">
            <label for="medicGrade">Grad profesional</label>
            <select id="medicGrade" [(ngModel)]="medicGrade" name="medicGrade" required>
              @for (g of medicGrades; track g.value) {
                <option [value]="g.value">{{ g.label }}</option>
              }
            </select>
          </div>
          <div class="form-group">
            <label for="specialty">Specialitate medicală</label>
            <select id="specialty" [(ngModel)]="specialty" name="specialty" required>
              <option value="" disabled>— Selectați —</option>
              @for (s of specialties; track s) {
                <option [value]="s">{{ s }}</option>
              }
            </select>
          </div>
        }

        <div class="form-group">
          <label for="academicTitles">Titluri academice <span class="optional">(opț.)</span></label>
          <input
            id="academicTitles"
            type="text"
            [(ngModel)]="academicTitles"
            name="academicTitles"
            placeholder="Opțional"
            maxlength="500"
          />
        </div>
        <div class="form-group">
          <label for="parafa">Parafă</label>
          <input
            id="parafa"
            type="text"
            [(ngModel)]="parafa"
            name="parafa"
            placeholder="Cod / identificator parafă"
            required
            minlength="2"
            maxlength="255"
          />
        </div>

        <div class="form-group full">
          <label for="password">Parolă (min. 6 caractere)</label>
          <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required minlength="6" />
        </div>
      </div>
      @if (error) {
        <div class="error-msg">{{ error }}</div>
      }
      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Se înregistrează...' : 'Înregistrare' }}
      </button>
    </form>
    <p class="login-link">Ai deja cont? <a routerLink="/login">Conectare</a></p>
  </div>
</div>
