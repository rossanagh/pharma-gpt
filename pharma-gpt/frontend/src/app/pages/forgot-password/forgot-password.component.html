<div class="auth-page">
  <div class="auth-card">
    <button type="button" class="auth-close" routerLink="/login">✕</button>

    <div class="auth-top">
      <div class="auth-logo" aria-hidden="true">
        <div class="auth-logo-mark">ME</div>
        <span class="auth-logo-name">MedicinEvidence</span>
      </div>
      <div class="auth-title">Reset password</div>
      <div class="auth-sub">Get a code by email or phone, then set a new password</div>
    </div>

    <div class="auth-body">
      @if (error()) {
        <div class="auth-err">{{ error() }}</div>
      }
      @if (info()) {
        <div class="auth-info">{{ info() }}</div>
      }

      <div class="fg">
        <label class="fl" for="target">Email or phone</label>
        <input
          class="fi"
          id="target"
          type="text"
          [(ngModel)]="target"
          name="target"
          placeholder="dr.ionescu@hospital.ro"
          [disabled]="loading() || step() === 'confirm'"
        />
      </div>

      @if (step() === 'request') {
        <button type="button" class="btn-sub" (click)="requestCode()" [disabled]="loading() || !target.trim()">
          {{ loading() ? 'Sending…' : 'Send code →' }}
        </button>
      } @else {
        <div class="fg">
          <label class="fl" for="code">Code</label>
          <input class="fi" id="code" type="text" [(ngModel)]="code" name="code" placeholder="123456" />
        </div>
        <div class="fg">
          <label class="fl" for="np">New password</label>
          <input
            class="fi"
            id="np"
            type="password"
            [(ngModel)]="newPassword"
            name="newPassword"
            placeholder="Min. 8 characters"
          />
        </div>
        <button
          type="button"
          class="btn-sub"
          (click)="confirm()"
          [disabled]="loading() || !code.trim() || newPassword.trim().length < 8"
        >
          {{ loading() ? 'Updating…' : 'Update password →' }}
        </button>
      }

      <p class="asw">
        Remembered? <a routerLink="/login">Sign in</a>
      </p>
    </div>
  </div>
</div>
