<div class="auth-page">
  <div class="auth-card" role="region" [attr.aria-label]="'ai.authTitle' | translate">
    <button type="button" class="auth-close" routerLink="/dashboard" [attr.aria-label]="'ai.close' | translate">
      {{ 'ai.close' | translate }}
    </button>

    <div class="auth-top">
      <div class="auth-logo" aria-hidden="true">
        <div class="auth-logo-mark">ME</div>
        <span class="auth-logo-name">MedicinEvidence</span>
      </div>
      <div class="auth-title">{{ 'ai.authTitle' | translate }}</div>
      <div class="auth-sub">{{ 'auth.loginSub' | translate }}</div>
    </div>

    <form class="auth-body" (ngSubmit)="onSubmit()">
      @if (error()) {
        <div class="auth-err">{{ error() }}</div>
      }
      <div class="fg">
        <label class="fl" for="email">{{ 'auth.email' | translate }}</label>
        <input
          class="fi"
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="dr.ionescu@hospital.ro"
          required
          autocomplete="email"
        />
      </div>
      <div class="fg">
        <label class="fl" for="password">{{ 'auth.password' | translate }}</label>
        <input
          class="fi"
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>
      <button type="submit" class="btn-sub" [disabled]="loading()">
        {{ loading() ? ('auth.signingIn' | translate) : ('ai.signIn' | translate) }}
      </button>
      <p class="asw asw--muted">
        <a routerLink="/forgot-password">{{ 'auth.forgotPassword' | translate }}</a>
      </p>
      <p class="asw">
        {{ 'auth.noAccount' | translate }}
        <a routerLink="/register">{{ 'ai.register' | translate }}</a>
      </p>
    </form>
  </div>
</div>
