<div class="login-page">
  <div class="login-card">
    <div class="brand-lock" aria-hidden="true">
      <img class="brand-mark" src="branding/logo.png" width="56" height="56" alt="" />
      <div class="brand-text">
        <span class="brand-name">Pharma-GPT</span>
        <span class="brand-tagline">Platformă medicală inteligentă</span>
      </div>
    </div>
    <h2>Autentificare</h2>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="nume@domeniu.ro"
          required
          autocomplete="email"
        />
      </div>
      <div class="form-group">
        <label for="password">Parolă</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>
      @if (error()) {
        <div class="error-msg">{{ error() }}</div>
      }
      <button type="submit" class="btn-primary" [disabled]="loading()">
        {{ loading() ? 'Se conectează...' : 'Conectare' }}
      </button>
    </form>
    <p class="login-link">Nu ai cont? <a routerLink="/register">Înregistrare</a></p>
  </div>
</div>
