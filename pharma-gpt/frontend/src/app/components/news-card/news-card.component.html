<a
  class="news-card"
  [class.news-card--rail]="rail()"
  [class.clickable]="!!url()"
  [href]="url() || null"
  [attr.target]="url() ? '_blank' : null"
  [attr.rel]="url() ? 'noopener noreferrer' : null"
>
  @if (imageUrl()) {
    <div class="card-image" [style.background-image]="'url(' + imageUrl() + ')'"></div>
  }
  <div class="card-body">
    @if (source()) {
      <span class="badge">{{ source() }}</span>
    }
    <h4 class="card-title">{{ title() }}</h4>
    @if (date()) {
      <p class="card-published">
        <span class="card-date-row">
          <svg class="card-cal-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
          <span class="card-published-value">{{ date() }}</span>
        </span>
      </p>
    }
    @if (excerpt()) {
      <p class="card-excerpt">{{ excerpt() }}</p>
    }
  </div>
</a>
