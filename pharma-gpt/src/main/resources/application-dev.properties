# Dev local — folosește același PostgreSQL ca producția: setează SPRING_DATASOURCE_URL / USER / PASSWORD
# (identic cu serverul sau cu docker-compose / .env).
#
# Chei locale: application-local.properties (gitignored) sau OPENAI_API_KEY în mediu.
spring.config.import=optional:classpath:application-local.properties

# Port backend dev (proxy Angular poate indica spre 8082)
server.port=${SERVER_PORT:8082}
