# Producție — aceleași variabile SPRING_DATASOURCE_* ca la local (vezi application.properties).
# OPENAI_API_KEY obligatoriu în Environment (Render) — nu pune cheia în Git.
spring.config.import=optional:classpath:application-local.properties

# Render setează PORT automat; local poți folosi SERVER_PORT
server.port=${PORT:${SERVER_PORT:8083}}

# In prod, don't log OTP codes to server logs
pharma.reset.dev-log-codes=${PHARMA_RESET_DEV_LOG_CODES:false}
