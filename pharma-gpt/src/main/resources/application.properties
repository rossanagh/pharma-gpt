spring.application.name=pharma-gpt

# Render port binding (Render provides $PORT, commonly 10000)
server.address=0.0.0.0
server.port=${PORT:8083}

# Profil implicit: dev (vezi application-dev.properties). Pentru H2 fără Postgres: SPRING_PROFILES_ACTIVE=h2
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# =============================================================================
# PostgreSQL — ACELAȘI mecanism la local și în producție
# Setează aceleași variabile (.env, IDE, server) ca să folosești aceeași bază (ex. aceeași instanță remote).
# =============================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pharma_gpt}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.h2.console.enabled=false

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Ensure baseline schema exists (useful for Render/Neon)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Anthropic Claude API (opțional)
anthropic.api-key=${ANTHROPIC_API_KEY:}

# OpenAI — producție: setează OPENAI_API_KEY în Render (Environment). Local: application-local.properties (gitignored).
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4o-mini}
openai.rag.max-chunks=${OPENAI_RAG_MAX_CHUNKS:4}

# Password reset (email / SMS)
pharma.mail.from=${PHARMA_MAIL_FROM:contact@medicinevidence.com}
# Dev fallback: log codes if SMTP/SMS not configured
pharma.reset.dev-log-codes=${PHARMA_RESET_DEV_LOG_CODES:true}

# SMTP (set these in Render Environment to enable real email delivery)
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.ssl.enable=${SMTP_SSL:false}

# JWT
jwt.secret=${JWT_SECRET:pharma-gpt-default-secret-key-min-256-bits-for-hs256}
jwt.expiration=86400000

# true = șterge useri/forum la pornire și reinserare seed — PERICULOS pe baza de producție. Default: false.
pharma.seed.full-reset-on-startup=${PHARMA_SEED_FULL_RESET_ON_STARTUP:false}
