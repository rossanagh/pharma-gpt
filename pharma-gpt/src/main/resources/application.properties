spring.application.name=pharma-gpt

# Profil implicit: dev (vezi application-dev.properties). Pentru H2 fără Postgres: SPRING_PROFILES_ACTIVE=h2
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# =============================================================================
# PostgreSQL — ACELAȘI mecanism la local și în producție
# Setează aceleași variabile (.env, IDE, server) ca să folosești aceeași bază (ex. aceeași instanță remote).
# =============================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pharma_gpt}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.h2.console.enabled=false

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Anthropic Claude API (opțional)
anthropic.api-key=${ANTHROPIC_API_KEY:}

# OpenAI — chat „Întreabă AI”
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4o-mini}
openai.rag.max-chunks=${OPENAI_RAG_MAX_CHUNKS:4}

# JWT
jwt.secret=${JWT_SECRET:pharma-gpt-default-secret-key-min-256-bits-for-hs256}
jwt.expiration=86400000

# true = șterge useri/forum la pornire și reinserare seed — PERICULOS pe baza de producție. Default: false.
pharma.seed.full-reset-on-startup=${PHARMA_SEED_FULL_RESET_ON_STARTUP:false}
