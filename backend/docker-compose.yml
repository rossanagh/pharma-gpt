services:
  mysql:
    image: mysql:8.0
    container_name: medicinevidence-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: medicinevidence
    ports:
      - "3306:3306"
    volumes:
      - me_mysql_data:/var/lib/mysql
      - ../database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]

volumes:
  me_mysql_data:

